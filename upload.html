<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>文件上传到 NAS</title>
  </head>
  <body>
    <h2>文件上传到 NAS</h2>

    <!-- NAS 状态显示区域 -->
    <div>
      <strong>NAS 状态：</strong>
      <span id="nasStatus">检测中...</span>
    </div>
    <hr />

    <!-- 上传表单 -->
    <div>
      <input type="file" id="fileInput" />
      <button id="uploadBtn">上传</button>
    </div>

    <!-- 上传进度条 -->
    <div style="margin-top: 10px">
      <progress
        id="uploadProgress"
        value="0"
        max="100"
        style="width: 300px"
      ></progress>
      <span id="progressPercent">0%</span>
    </div>

    <!-- 上传结果显示区域 -->
    <div id="uploadResult" style="margin-top: 10px"></div>

    <script>
      // 获取 DOM 元素
      const nasStatusSpan = document.getElementById("nasStatus");
      const fileInput = document.getElementById("fileInput");
      const uploadBtn = document.getElementById("uploadBtn");
      const uploadResultDiv = document.getElementById("uploadResult");
      const uploadProgress = document.getElementById("uploadProgress");
      const progressPercent = document.getElementById("progressPercent");

      // 检测 NAS 连通性并更新页面显示
      async function checkNAS() {
        try {
          const response = await fetch("/check_nas");
          const data = await response.json();
          if (data.status === "ok") {
            nasStatusSpan.textContent = "✅ 可访问 (" + data.message + ")";
          } else {
            nasStatusSpan.textContent = "❌ 不可访问 (" + data.message + ")";
          }
        } catch (error) {
          nasStatusSpan.textContent = "❌ 检测失败 (" + error.message + ")";
        }
      }

      // 上传文件（带进度条）
      function uploadFile() {
        const file = fileInput.files[0];
        if (!file) {
          uploadResultDiv.textContent = "请先选择一个文件。";
          return;
        }

        // 重置进度条和结果
        uploadProgress.value = 0;
        progressPercent.textContent = "0%";
        uploadResultDiv.textContent = "";
        uploadBtn.disabled = true;

        const formData = new FormData();
        formData.append("file", file);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload", true);

        // 监听上传进度
        xhr.upload.onprogress = function (event) {
          if (event.lengthComputable) {
            const percentComplete = Math.round(
              (event.loaded / event.total) * 100,
            );
            uploadProgress.value = percentComplete;
            progressPercent.textContent = percentComplete + "%";
          }
        };

        // 监听请求完成
        xhr.onload = function () {
          uploadBtn.disabled = false;
          if (xhr.status === 200) {
            uploadResultDiv.textContent = xhr.responseText;
          } else {
            uploadResultDiv.textContent = "上传失败：HTTP " + xhr.status;
          }
          // 上传完成后保持进度条 100%（可选）
          uploadProgress.value = 100;
          progressPercent.textContent = "100%";
        };

        xhr.onerror = function () {
          uploadBtn.disabled = false;
          uploadResultDiv.textContent = "上传失败：网络错误";
        };

        xhr.send(formData);
      }

      // 页面加载后立即检测一次，然后每 30 秒检测一次
      checkNAS();
      setInterval(checkNAS, 30000);

      // 绑定上传按钮事件
      uploadBtn.addEventListener("click", uploadFile);
    </script>
  </body>
</html>
