<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>NAS 文件管理 + 上传</title>
  </head>
  <body>
    <h2>NAS 文件管理</h2>

    <!-- NAS 状态显示区域 -->
    <div>
      <strong>NAS 状态：</strong>
      <span id="nasStatus">检测中...</span>
    </div>
    <hr />

    <!-- 上传表单 -->
    <div>
      <h3>上传文件</h3>
      <input type="file" id="fileInput" />
      <button id="uploadBtn">上传</button>
      <div style="margin-top: 10px">
        <progress
          id="uploadProgress"
          value="0"
          max="100"
          style="width: 300px"
        ></progress>
        <span id="progressPercent">0%</span>
      </div>
      <div id="uploadResult" style="margin-top: 10px"></div>
    </div>
    <hr />

    <!-- 文件管理区域 -->
    <div>
      <h3>文件列表</h3>
      <div>
        <strong>当前路径：</strong>
        <span id="currentPath">/</span>
        <button id="homeBtn">返回根目录</button>
        <button id="parentBtn" disabled>返回上级</button>
      </div>
      <br />
      <table border="1" style="border-collapse: collapse; width: 100%">
        <thead>
          <tr>
            <th>名称</th>
            <th>大小</th>
            <th>修改时间</th>
          </tr>
        </thead>
        <tbody id="fileListBody">
          <tr>
            <td colspan="3">加载中...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      // ========== 1. 上传相关逻辑 ==========
      const fileInput = document.getElementById("fileInput");
      const uploadBtn = document.getElementById("uploadBtn");
      const uploadResultDiv = document.getElementById("uploadResult");
      const uploadProgress = document.getElementById("uploadProgress");
      const progressPercent = document.getElementById("progressPercent");

      function uploadFile() {
        const file = fileInput.files[0];
        if (!file) {
          uploadResultDiv.textContent = "请先选择一个文件。";
          return;
        }

        uploadProgress.value = 0;
        progressPercent.textContent = "0%";
        uploadResultDiv.textContent = "";
        uploadBtn.disabled = true;

        const formData = new FormData();
        formData.append("file", file);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/upload", true);

        xhr.upload.onprogress = function (event) {
          if (event.lengthComputable) {
            const percentComplete = Math.round(
              (event.loaded / event.total) * 100,
            );
            uploadProgress.value = percentComplete;
            progressPercent.textContent = percentComplete + "%";
          }
        };

        xhr.onload = function () {
          uploadBtn.disabled = false;
          if (xhr.status === 200) {
            uploadResultDiv.textContent = xhr.responseText;
            // 上传成功后刷新当前目录的文件列表
            loadList(currentPath);
          } else {
            uploadResultDiv.textContent = "上传失败：HTTP " + xhr.status;
          }
          uploadProgress.value = 100;
          progressPercent.textContent = "100%";
        };

        xhr.onerror = function () {
          uploadBtn.disabled = false;
          uploadResultDiv.textContent = "上传失败：网络错误";
        };

        xhr.send(formData);
      }

      uploadBtn.addEventListener("click", uploadFile);

      // ========== 2. NAS 连通性检测 ==========
      async function checkNAS() {
        try {
          const response = await fetch("/check_nas");
          const data = await response.json();
          const nasSpan = document.getElementById("nasStatus");
          if (data.status === "ok") {
            nasSpan.textContent = "✅ 可访问 (" + data.message + ")";
          } else {
            nasSpan.textContent = "❌ 不可访问 (" + data.message + ")";
          }
        } catch (error) {
          document.getElementById("nasStatus").textContent = "❌ 检测失败";
        }
      }

      // ========== 3. 文件列表管理 ==========
      let currentPath = "/";

      function formatSize(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB", "TB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + " " + sizes[i];
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      async function loadList(path) {
        const tbody = document.getElementById("fileListBody");
        tbody.innerHTML = '<tr><td colspan="3">加载中...</td></tr>';
        try {
          let url = "/api/list";
          if (path && path !== "/") {
            url += "?path=" + encodeURIComponent(path);
          }
          const response = await fetch(url);
          const data = await response.json();
          if (data.status !== "ok") {
            tbody.innerHTML = `<tr><td colspan="3">错误：${data.message}</td></tr>`;
            return;
          }
          currentPath = data.path;
          document.getElementById("currentPath").innerText = currentPath;
          const parentBtn = document.getElementById("parentBtn");
          if (currentPath === "/") {
            parentBtn.disabled = true;
          } else {
            parentBtn.disabled = false;
          }

          if (data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3">空目录</td></tr>';
            return;
          }

          let html = "";
          for (const item of data.items) {
            const name = item.name;
            const isDir = item.is_dir;
            const size = isDir ? "-" : formatSize(item.size);
            const mtime = item.mtime || "-";
            let action = "";
            if (isDir) {
              action = `onclick="enterFolder('${encodeURIComponent(name)}')" style="cursor:pointer;color:blue;text-decoration:underline;"`;
            } else {
              action = `onclick="downloadFile('${encodeURIComponent(name)}')" style="cursor:pointer;color:green;text-decoration:underline;"`;
            }
            html += `<tr>
                        <td><span ${action}>${escapeHtml(name)}</span></td>
                        <td>${size}</td>
                        <td>${escapeHtml(mtime)}</td>
                    </tr>`;
          }
          tbody.innerHTML = html;
        } catch (error) {
          tbody.innerHTML = `<tr><td colspan="3">加载失败：${error.message}</td></tr>`;
        }
      }

      window.enterFolder = function (folderName) {
        let newPath;
        if (currentPath === "/") {
          newPath = "/" + folderName;
        } else {
          newPath = currentPath + "/" + folderName;
        }
        loadList(newPath);
      };

      window.downloadFile = function (fileName) {
        let fullPath;
        if (currentPath === "/") {
          fullPath = "/" + fileName;
        } else {
          fullPath = currentPath + "/" + fileName;
        }
        // 需要后端实现 /download 接口
        window.location.href = "/download?path=" + encodeURIComponent(fullPath);
      };

      function goParent() {
        if (currentPath === "/") return;
        let parentPath = currentPath.substring(0, currentPath.lastIndexOf("/"));
        if (parentPath === "") parentPath = "/";
        loadList(parentPath);
      }

      function goHome() {
        loadList("/");
      }

      // ========== 初始化 ==========
      function init() {
        checkNAS();
        setInterval(checkNAS, 30000);
        loadList("/");
        document
          .getElementById("parentBtn")
          .addEventListener("click", goParent);
        document.getElementById("homeBtn").addEventListener("click", goHome);
      }

      init();
    </script>
  </body>
</html>
